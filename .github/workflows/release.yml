name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        shell: pwsh
        run: |
          if ('${{ github.ref_name }}' -notmatch '^\d+\.\d+\.\d+$') {
            throw 'Tag must have format X.Y.Z'
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Stamp version from tag
        shell: pwsh
        run: |
          $version = '${{ github.ref_name }}'
          python scripts/set_version.py $version

      - name: Build app
        shell: pwsh
        run: |
          pyinstaller main.py `
            --noconfirm `
            --windowed `
            --name WallpaperProcessor `
            --add-data "assets;assets"

      - name: Pack release archive
        shell: pwsh
        run: |
          if (Test-Path dist\WallpaperProcessor-win64.zip) {
            Remove-Item dist\WallpaperProcessor-win64.zip -Force
          }
          Compress-Archive -Path dist\WallpaperProcessor -DestinationPath dist\WallpaperProcessor-win64.zip -Force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/WallpaperProcessor-win64.zip
